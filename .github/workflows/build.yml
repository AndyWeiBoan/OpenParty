name: Build openparty-join

on:
  push:
    tags:
      - "v*"          # 觸發條件：push 一個 tag，如 git tag v1.0.0 && git push --tags
  workflow_dispatch:  # 也可以在 GitHub UI 手動觸發

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14        # macOS ARM64 (Apple Silicon)
            label: macos-arm64
            binary: openparty-join
          - os: macos-13        # macOS x86_64 (Intel)
            label: macos-x86_64
            binary: openparty-join
          - os: ubuntu-22.04    # Linux x86_64
            label: linux-x86_64
            binary: openparty-join
          - os: windows-2022    # Windows x86_64
            label: windows-x86_64
            binary: openparty-join.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install aiohttp websockets pyinstaller
          pip install claude-agent-sdk || echo "claude-agent-sdk not available on this platform, skipping"

      - name: Build binary
        run: |
          python -m PyInstaller \
            --onefile \
            --name openparty-join \
            --hidden-import=aiohttp \
            --hidden-import=aiohttp.connector \
            --hidden-import=aiohttp.client \
            --hidden-import=websockets \
            --hidden-import=websockets.legacy \
            --hidden-import=websockets.legacy.client \
            openparty_join.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openparty-join-${{ matrix.label }}
          path: dist/${{ matrix.binary }}

  # 把所有 artifact 合併成一個 GitHub Release
  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries with platform suffix
        run: |
          mkdir release
          for dir in artifacts/*/; do
            label=$(basename "$dir")
            # e.g. openparty-join-macos-arm64
            if [ -f "$dir/openparty-join.exe" ]; then
              cp "$dir/openparty-join.exe" "release/openparty-join-${label#openparty-join-}.exe"
            else
              cp "$dir/openparty-join" "release/openparty-join-${label#openparty-join-}"
              chmod +x "release/openparty-join-${label#openparty-join-}"
            fi
          done
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body: |
            ## openparty-join ${{ github.ref_name }}

            Download the binary for your platform:

            | Platform | File |
            |---|---|
            | macOS Apple Silicon | `openparty-join-macos-arm64` |
            | macOS Intel | `openparty-join-macos-x86_64` |
            | Linux x86_64 | `openparty-join-linux-x86_64` |
            | Windows | `openparty-join-windows-x86_64.exe` |

            ### Requirements
            Users still need to install their engine separately:
            - **Claude** → https://docs.anthropic.com/en/docs/claude-code
            - **OpenCode** → https://opencode.ai
